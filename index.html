<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sekkii – Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      line-height: 1.7;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    header {
      text-align: center;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid #e5e5e5;
    }
    header .app-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      margin-bottom: 16px;
    }
    header h1 { font-size: 28px; font-weight: 700; }
    header p { color: #666; margin-top: 8px; }
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 32px;
    }
    .card {
      display: block;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: #e8432e;
      box-shadow: 0 2px 8px rgba(232, 67, 46, 0.1);
    }
    .card h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #e8432e;
    }
    .card p {
      font-size: 14px;
      color: #666;
      margin: 0;
    }
    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid #e5e5e5;
      text-align: center;
      color: #999;
      font-size: 13px;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <img class="app-icon" src="app-icon.png" alt="Sekkii">
    <h1>Sekkii</h1>
    <p>Legal &amp; Support</p>
  </header>

  <div class="card-list">
    <a class="card" href="privacy.html">
      <h2>Privacy Policy / 隐私政策</h2>
      <p>How we collect, use, and protect your data.</p>
    </a>
    <a class="card" href="terms.html">
      <h2>Terms of Use / 用户协议</h2>
      <p>Rules and conditions for using Sekkii.</p>
    </a>
    <a class="card" href="support.html">
      <h2>Support / 技术支持</h2>
      <p>FAQs and contact information.</p>
    </a>
  </div>

  <footer>
    <p>© 2026 Tis Wu. All rights reserved.</p>
  </footer>
</div>
</body>
</html>
